name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install uv
        run: python -m pip install uv==0.9.0

      - name: Sync dependencies
        run: uv sync --locked --all-extras --dev

      - name: Complexity report (review-only)
        continue-on-error: true
        timeout-minutes: 5
        run: |
          uv run python scripts/admin/complexity_report.py --top 30 --format markdown | tee complexity-report.md
          cat complexity-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Install Playwright browsers
        run: uv run python -m playwright install --with-deps chromium

      - name: Lint
        run: uv run ruff check src scripts tests

      - name: Type check
        run: uv run mypy

      - name: JavaScript syntax
        run: find src/facebook_monitor/webapp/static -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Test
        run: uv run pytest -q --cov=facebook_monitor --cov-report=term-missing --cov-fail-under=80

      - name: Dependency audit
        run: uv run pip-audit
