<script>
(() => {
  const allowedThemes = new Set(["light", "dark"]);
  let theme = {{ initial_theme | default("dark") | tojson }};
  if (!allowedThemes.has(theme)) {
    theme = "dark";
  }
  document.documentElement.dataset.theme = theme;
})();
</script>
<meta name="csrf-token" content="{{ csrf_token }}">
