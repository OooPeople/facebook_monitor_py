<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>新增 target - Facebook Monitor</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <h1>新增 target</h1>
        <p>Facebook group posts / comments</p>
      </div>
      <a class="button" href="/">返回</a>
    </header>

    {% if error %}
      <div class="notice error">{{ error }}</div>
    {% endif %}
    {% if message %}
      <div class="notice success">{{ message }}</div>
    {% endif %}

    <section class="target">
      <form class="config-form" method="post" action="/targets">
        <label>
          Facebook group URL / post URL
          <input name="group_url" type="text" required placeholder="社團: https://www.facebook.com/groups/123456789；留言: https://www.facebook.com/groups/123456789/posts/987654321">
        </label>
        <label>
          自訂顯示名稱
          <input name="display_name" type="text">
        </label>
        <label>
          Include keywords
          <textarea name="include_keywords" rows="2"></textarea>
        </label>
        <label>
          Exclude keywords
          <textarea name="exclude_keywords" rows="2"></textarea>
        </label>
        <div class="form-grid">
          <label>
            Scan interval sec
            <input name="fixed_refresh_sec" type="number" min="1" value="{{ target_defaults.fixed_refresh_sec }}">
          </label>
          <label>
            Max items
            <input name="max_items_per_scan" type="number" min="1" max="10" value="{{ target_defaults.max_items_per_scan }}">
          </label>
          <label class="checkbox">
            <input name="auto_load_more" type="checkbox" {% if target_defaults.auto_load_more %}checked{% endif %}>
            自動載入更多
          </label>
          <label class="checkbox">
            <input name="auto_adjust_sort" type="checkbox" {% if target_defaults.auto_adjust_sort %}checked{% endif %}>
            自動調整最新排序
          </label>
          <label class="checkbox">
            <input name="enable_desktop_notification" type="checkbox" {% if notification_settings.enable_desktop_notification %}checked{% endif %}>
            啟用桌面通知
          </label>
          <label class="checkbox">
            <input name="enable_ntfy" type="checkbox" {% if notification_settings.enable_ntfy %}checked{% endif %}>
            啟用 ntfy 通知
          </label>
          <label>
            ntfy topic
            <input name="ntfy_topic" type="text" value="{{ notification_settings.ntfy_topic }}">
          </label>
          <label class="checkbox">
            <input name="enable_discord_notification" type="checkbox" {% if notification_settings.enable_discord_notification %}checked{% endif %}>
            啟用 Discord 通知
          </label>
          <label>
            Discord webhook URL
            <input name="discord_webhook" type="text" value="{{ notification_settings.discord_webhook }}">
          </label>
        </div>
        <div class="actions">
          <button type="submit">新增</button>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
