<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>設定 - Facebook Monitor</title>
  <link rel="stylesheet" href="/static/style.css?v=ui-refactor-phase18-form-sidebar-status">
</head>
<body>
  <main class="shell settings-shell">
    <header class="topbar">
      <div class="page-title">
        <h1>設定</h1>
        <p>全域 automation profile 與帳號狀態</p>
      </div>
      <a class="button" href="/">返回</a>
    </header>

    <div class="toast-stack" aria-live="polite" aria-atomic="true">
      {% if error %}
        <div class="toast error">{{ error }}</div>
      {% endif %}
    </div>

    <section class="target settings-card">
      <div class="settings-card-head">
        <div class="settings-card-title">
          <h2>Facebook automation profile</h2>
          <p>{{ profile_dir }}</p>
        </div>
        <span class="status {% if profile_active %}enabled{% else %}muted{% endif %}">
          {% if profile_active %}視窗開啟中{% else %}未開啟{% endif %}
        </span>
      </div>

      <div class="settings-action-row">
        <form method="post" action="/settings/facebook/open">
          <button type="submit">開啟登入視窗</button>
        </form>
        <form method="post" action="/settings/facebook/close">
          <button type="submit">關閉視窗</button>
        </form>
      </div>
    </section>

    <section class="target settings-card">
      <div class="settings-card-head">
        <div class="settings-card-title">
          <h2>通知預設值</h2>
          <p>未填寫也不影響功能；各 target 仍以自己的通知設定為準。此區塊只作為新增 target 預設值、測試通知與批次套用來源。</p>
        </div>
      </div>

      <form id="notification-defaults-form" class="config-form settings-notification-form" method="post" action="/settings/notifications">
        <div class="settings-notification-stack">
          <label class="checkbox">
            <input name="enable_desktop_notification" type="checkbox" {% if notification_settings.enable_desktop_notification %}checked{% endif %}>
            桌面通知
          </label>
          <label class="checkbox">
            <input name="enable_ntfy" type="checkbox" {% if notification_settings.enable_ntfy %}checked{% endif %}>
            ntfy
          </label>
          <label>
            ntfy topic
            <input name="ntfy_topic" type="text" value="{{ notification_settings.ntfy_topic }}">
          </label>
          <label class="checkbox">
            <input name="enable_discord_notification" type="checkbox" {% if notification_settings.enable_discord_notification %}checked{% endif %}>
            Discord webhook
          </label>
          <label>
            Discord webhook URL
            <input name="discord_webhook" type="text" value="{{ notification_settings.discord_webhook }}">
          </label>
        </div>
      </form>

      <div class="settings-notification-actions">
        <form method="post" action="/settings/notifications/test">
          <button type="submit">發送測試通知</button>
        </form>
        <div class="settings-action-cluster">
          <span class="inline-feedback form-status" data-dirty-status aria-live="polite">尚未儲存</span>
          <form method="post" action="/settings/notifications/apply-to-targets" onsubmit="return confirm('套用通知預設值到所有社團設定？');">
            <button type="submit">套用到所有 target</button>
          </form>
          <button class="button primary" type="submit" form="notification-defaults-form">保存通知預設值</button>
        </div>
      </div>
    </section>
  </main>
  <script id="page-feedback" type="application/json">{{ {"message": message, "error": error} | tojson }}</script>
  <script>
    (() => {
      const editableSelector = "input, textarea, select";
      const feedbackNode = document.getElementById("page-feedback");
      const pageFeedback = feedbackNode ? JSON.parse(feedbackNode.textContent || "{}") : {};
      const showInlineStatus = (node, text, kind, timeoutMs = 0) => {
        if (!node) return;
        node.textContent = text;
        node.dataset.statusKind = kind;
        node.classList.add("is-visible");
        if (timeoutMs > 0) {
          window.setTimeout(() => {
            if (document.body.contains(node) && node.dataset.statusKind === kind) {
              node.classList.remove("is-visible");
            }
          }, timeoutMs);
        }
      };
      const showToast = (text, kind = "success") => {
        if (!text) return;
        const stack = document.querySelector(".toast-stack");
        if (!stack) return;
        const toast = document.createElement("div");
        toast.className = `toast ${kind}`;
        toast.textContent = text;
        stack.appendChild(toast);
        window.setTimeout(() => {
          if (document.body.contains(toast)) {
            toast.remove();
          }
        }, 3500);
      };
      const clearFeedbackParams = () => {
        if (!pageFeedback.message && !pageFeedback.error) return;
        const url = new URL(window.location.href);
        url.searchParams.delete("message");
        url.searchParams.delete("error");
        window.history.replaceState(null, "", `${url.pathname}${url.search}${url.hash}`);
      };
      const notificationForm = document.querySelector('form[action="/settings/notifications"]');
      const notificationStatus = notificationForm
        ? notificationForm.querySelector("[data-dirty-status]")
        : null;
      if (notificationForm) {
        const markDirty = () => showInlineStatus(notificationStatus, "尚未儲存", "dirty");
        notificationForm.querySelectorAll(editableSelector).forEach((node) => {
          node.addEventListener("input", markDirty);
          node.addEventListener("change", markDirty);
        });
      }
      if (pageFeedback.message === "通知預設值已保存") {
        showInlineStatus(notificationStatus, "設定已更新", "saved", 2500);
      } else if (pageFeedback.message) {
        showToast(pageFeedback.message, "success");
      }
      clearFeedbackParams();
    })();
  </script>
</body>
</html>
